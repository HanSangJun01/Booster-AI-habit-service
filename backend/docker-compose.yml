services:
  # PostgreSQL 데이터베이스
  db:
    image: postgres:16
    container_name: booster-db
    environment:
      POSTGRES_DB: booster
      POSTGRES_USER: booster
      POSTGRES_PASSWORD: booster
    ports:
      - "5432:5432"
    volumes:
      - booster-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booster -d booster"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot 백엔드
  backend:
    build: .
    container_name: booster-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 컨테이너 간 통신은 서비스명(db)을 호스트로 사용
      DB_URL: jdbc:postgresql://db:5432/booster
      DB_USERNAME: booster
      DB_PASSWORD: booster
      # 운영 전환 시 반드시 강력한 시크릿으로 교체
      JWT_SECRET: booster-local-dev-secret-key-please-change-in-production-0123456789
    ports:
      - "8080:8080"

volumes:
  booster-db-data:

spring:
  profiles:
    active: stub
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/booster?socketTimeout=30&tcpKeepAlive=true}"
    username: ${DB_USERNAME:booster}
    password: ${DB_PASSWORD:booster}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
        generate_statistics: false
      jakarta.persistence.query.timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.booster: INFO
    org.hibernate.SQL: WARN
    org.hibernate.stat: WARN

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: booster
    distribution:
      percentiles-histogram:
        http.server.requests: true
        hikaricp.connections.acquire: true

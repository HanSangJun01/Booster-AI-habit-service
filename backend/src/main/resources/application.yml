spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booster}
    username: ${DB_USERNAME:booster}
    password: ${DB_PASSWORD:booster}
    driver-class-name: org.postgresql.Driver
    # [BS-30 최적화 ②] 커넥션풀 크기 명시. 기본 10으로는 500VU 부하에서 Hikari pending 189 관측.
    # DB max_connections(기본 100)와 인스턴스 수를 함께 고려(pool × 인스턴스 ≤ max_connections).
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
        # [BS-30 ② SQL 가시성] 코드 수정 없이 설정만. 측정 주간 한정.
        # generate_statistics: 한 요청이 쿼리 몇 번 날렸는지 통계 출력 → N+1 탐지
        generate_statistics: true
        # 지정 ms보다 느린 쿼리를 org.hibernate.SQL_SLOW 로 자동 로깅 → 느린 쿼리 색출
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 100
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  # 운영 환경에서는 반드시 JWT_SECRET 환경변수로 256비트 이상 시크릿을 주입한다.
  secret: ${JWT_SECRET:booster-local-dev-secret-key-please-change-in-production-0123456789}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:86400000}

booster:
  # 스트릭 보상: 7일마다 반복 지급(true) / 최초 7일 1회만(false). bs-25 확정: 반복.
  streak:
    reward-repeat: ${STREAK_REWARD_REPEAT:true}
    reward-interval-days: 7
    reward-coins: 100
  coin:
    signup-bonus: 500
    recovery-success-penalty: 50
    recovery-failure-penalty: 100

logging:
  level:
    com.booster: INFO
    org.hibernate.SQL: WARN
    # [BS-30 ②] 느린 쿼리만 INFO로 노출(전체 SQL은 WARN로 막아 부하테스트 로그 폭주 방지)
    org.hibernate.SQL_SLOW: INFO

# [BS-30 계기판] Actuator 노출 설정. 측정 주간 한정, A축 원본(BS-25)엔 없음.
management:
  endpoints:
    web:
      exposure:
        # health: 살아있나 / metrics: 수치 조회 / prometheus: Prometheus가 긁어갈 엔드포인트
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      # 모든 수치에 이 태그를 붙여 A축 앱 식별 (Grafana에서 필터용)
      application: booster-a-axis
    distribution:
      # [③ 퍼센타일] 평균은 거짓말 → p95/p99로 "가끔 느린 놈" 색출
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      # SLO 경계: 이 시간들을 넘는 요청 비율을 히스토그램 버킷으로 집계
      slo:
        http.server.requests: 100ms, 300ms, 500ms, 1s

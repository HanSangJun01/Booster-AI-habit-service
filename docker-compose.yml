version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: booster-postgres
    environment:
      POSTGRES_DB: booster
      POSTGRES_USER: booster
      POSTGRES_PASSWORD: booster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booster"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
